<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>Mega Mundo Inmersivo AR Móvil</title>
  
  <!-- Librerías de A-Frame y AR.js -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0px; overflow: hidden;">

  <!-- INTERFAZ DE BIENVENIDA CON INDICACIONES DIRECTAS -->
  <div id="welcome-screen">
    <div class="card">
      <h1>Portal Inmersivo</h1>
      <p>1. Permite el acceso a tu cámara y giroscopio.<br>
         2. Mueve el teléfono en 360° para explorar.<br>
         3. Mira fijamente los objetos centrales para interactuar.</p>
      <button class="btn-start" id="btn-start">Iniciar Simulador</button>
    </div>
  </div>

  <!-- ESCENA AR CORREGIDA PARA COMPATIBILIDAD MÓVIL Y ESCRITORIO -->
  <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <!-- ILUMINACIÓN -->
    <a-light type="ambient" color="#e0f7fa" intensity="0.4"></a-light>
    <a-light type="directional" color="#ffb74d" intensity="0.9" position="5 10 -5"></a-light>
    <a-light type="point" color="#00f2fe" intensity="0.6" position="0 3 -4"></a-light>

    <!-- INTERFAZ HUD FLOTANTE (PANEL DE DATOS) -->
    <a-entity id="hud-panel" position="0 2.2 -3.5" visible="false">
      <a-plane width="3.2" height="0.9" color="#0b0f19" material="opacity: 0.9; transparent: true"></a-plane>
      <a-text id="hud-title" value="ESTRUCTURA DETECTADA" align="center" position="0 0.22 0.01" width="4.8" color="#00f2fe"></a-text>
      <a-text id="hud-desc" value="" align="center" position="0 -0.15 0.01" width="3.5" color="#ffffff"></a-text>
    </a-entity>

    <!-- ==================== EL MEGA MUNDO GEOMÉTRICO ==================== -->
    <a-entity id="torii-gate" class="interactuable" position="0 0 -6" scale="1.2 1.2 1.2">
      <a-cylinder radius="0.15" height="4" position="-2 2 0" color="#b71c1c"></a-cylinder>
      <a-cylinder radius="0.15" height="4" position="2 2 0" color="#b71c1c"></a-cylinder>
      <a-box width="5.2" height="0.25" depth="0.4" position="0 4 0" color="#111"></a-box>
      <a-box width="4.8" height="0.3" depth="0.3" position="0 3.7 0" color="#b71c1c"></a-box>
      <a-box width="0.5" height="0.4" depth="0.5" position="-2 0.2 0" color="#37474f"></a-box>
      <a-box width="0.5" height="0.4" depth="0.5" position="2 0.2 0" color="#37474f"></a-box>
    </a-entity>

    <a-entity id="floating-island" position="0 1.5 -4.5" scale="0.7 0.7 0.7">
      <a-dodecahedron radius="1.2" position="0 -0.5 0" color="#455a64" scale="1.5 0.6 1.5" rotation="180 45 0"></a-dodecahedron>
      <a-cylinder radius="1.5" height="0.1" position="0 -0.1 0" color="#2e7d32"></a-cylinder>
      <a-octahedron id="mystic-crystal" class="interactuable" radius="0.5" position="0 0.8 0" color="#00f2fe"
                    material="opacity: 0.85; transparent: true; shader: flat"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-octahedron>
    </a-entity>

    <a-entity id="tree-master" class="interactuable" position="3 0 -5">
      <a-cylinder radius="0.2" height="2.5" color="#5c4033"></a-cylinder>
      <a-sphere radius="0.9" position="0 1.5 0" color="#2e7d32"></a-sphere>
      <a-sphere radius="0.7" position="0.4 1.9 0.2" color="#388e3c"></a-sphere>
    </a-entity>
    
    <a-entity position="-3.5 0 -4.5">
      <a-cylinder radius="0.15" height="2" color="#5c4033"></a-cylinder>
      <a-sphere radius="0.7" position="0 1.2 0" color="#c2185b"></a-sphere>
      <a-sphere radius="0.5" position="-0.3 1.5 -0.1" color="#e91e63"></a-sphere>
    </a-entity>

    <a-entity id="lanterns-group">
      <a-box class="interactuable" position="-2 3 -3.5" width="0.2" height="0.3" depth="0.2" color="#ffb74d" material="shader:flat">
        <a-cone radius-bottom="0.15" height="0.1" position="0 0.2 0" color="#111"></a-cone>
      </a-box>
      <a-box class="interactuable" position="2 2.8 -3.8" width="0.2" height="0.3" depth="0.2" color="#ffb74d" material="shader:flat">
        <a-cone radius-bottom="0.15" height="0.1" position="0 0.2 0" color="#111"></a-cone>
      </a-box>
      <a-box class="interactuable" position="0 4.5 -8" width="0.3" height="0.45" depth="0.3" color="#ffcc80" material="shader:flat">
        <a-cone radius-bottom="0.25" height="0.12" position="0 0.3 0" color="#111"></a-cone>
      </a-box>
    </a-entity>

    <a-entity id="pagoda-epic" class="interactuable" position="-4 0 -8" scale="0.9 0.9 0.9" rotation="0 35 0">
      <a-box width="2.2" height="1.4" depth="2.2" color="#d32f2f"></a-box>
      <a-box width="2.6" height="0.15" depth="2.6" position="0 0.7 0" color="#212121"></a-box>
      <a-box width="1.6" height="1.2" depth="1.6" position="0 1.3 0" color="#d32f2f"></a-box>
      <a-box width="2.0" height="0.15" depth="2.0" position="0 1.9 0" color="#212121"></a-box>
      <a-cone radius-bottom="0.8" height="0.9" position="0 2.7 0" color="#212121"></a-cone>
    </a-entity>

    <a-entity position="0 -0.4 -7" scale="0.8 0.8 0.8">
      <a-cylinder radius="5" height="1.8" theta-length="36" theta-start="72" rotation="90 0 0" color="#b71c1c" material="side: double"></a-cylinder>
    </a-entity>

    <!-- CÁMARA Y RETÍCULO -->
    <a-entity camera look-controls>
      <a-cursor 
        id="fuse-cursor"
        material="color: #00f2fe; shader: flat"
        geometry="radiusInner: 0.015; radiusOuter: 0.025"
        raycaster="objects: .interactuable"
        animation__fusing="property: geometry.radiusInner; from: 0.015; to: 0; dur: 1200; startEvents: fusing"
        animation__mouseleave="property: geometry.radiusInner; to: 0.015; dur: 200; startEvents: mouseleave">
      </a-cursor>
    </a-entity>

  </a-scene>

  <script src="script.js"></script>
</body>
</html>
